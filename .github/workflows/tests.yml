name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (lean — excludes faster-whisper)
        run: |
          python -m pip install --upgrade pip
          grep -v faster-whisper requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt -r test/requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest test \
            --cov=backend --cov-report=term-missing \
            -o cache_dir=test/.pytest_cache \
            | tee pytest-output.txt

      - name: Publish coverage to job summary
        if: always()
        run: |
          {
            echo '### Test results & coverage'
            echo '```'
            tail -n 40 pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
