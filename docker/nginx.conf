server {
    listen 80;
    server_name _;

    client_max_body_size 0;  # video uploads can be large

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;  # no trailing slash: URI passed through unchanged
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;  # stream uploads straight to the backend
        proxy_buffering off;          # stream video playback/downloads back out
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri /index.html;  # SPA fallback
    }
}
